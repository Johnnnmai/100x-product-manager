commands:
  - id: pm-command-center
    path: commands/pm-command-center.md
    purpose: Route the user to the shortest useful workflow.
    skills:
      - idea-explorer
      - demand-reality-checker
      - agent-readable-prd-writer
      - roadmap-orchestrator
  - id: shape-idea
    path: commands/shape-idea.md
    purpose: Turn a rough idea into a wedge, scope, and next move.
    skills:
      - idea-explorer
      - opportunity-wedge-selector
      - idea-scope-down-architect
      - problem-framing-canvas
      - success-metric-spec-writer
  - id: validate-demand
    path: commands/validate-demand.md
    purpose: Judge whether demand is real with evidence.
    skills:
      - evidence-collector
      - market-signal-harvester
      - evidence-triangulator
      - demand-reality-checker
      - user-insight-synthesizer
  - id: agent-prd
    path: commands/agent-prd.md
    purpose: Write a spec for both human review and agent execution.
    skills:
      - problem-statement
      - agent-readable-prd-writer
      - prd-development
      - prd-coverage-checker
  - id: prioritize
    path: commands/prioritize.md
    purpose: Make trade-offs explicit and decide what to defer.
    skills:
      - prioritization-advisor
      - market-driven-prioritization
      - feature-investment-advisor
  - id: define-metrics
    path: commands/define-metrics.md
    purpose: Define success, counter metrics, thresholds, and windows.
    skills:
      - success-metric-spec-writer
      - ab-test-designer
  - id: design-experiment
    path: commands/design-experiment.md
    purpose: Turn a hypothesis into a real test.
    skills:
      - ab-test-designer
      - rapid-iteration-cycle
  - id: design-eval
    path: commands/design-eval.md
    purpose: Define AI evals, fallback, and review triggers.
    skills:
      - eval-design-for-ai-feature
      - fallback-and-guardrail-designer
      - token-budget-optimizer
  - id: run-roadmap
    path: commands/run-roadmap.md
    purpose: Split direction into milestones, owners, and tracking.
    skills:
      - roadmap-orchestrator
      - task-delegation-planner
      - task-tracking-operator
      - roadmap-planning
  - id: make-content
    path: commands/make-content.md
    purpose: Turn internal work into external distribution.
    skills:
      - xhs-proof-of-work-post
      - seo-brief-builder
      - geo-entity-brief

